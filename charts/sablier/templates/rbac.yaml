apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sablier-{{ .Release.Name }}
rules:
  - apiGroups:
      - apps
      - ""
    resources:
      - deployments
      - deployments/scale
      - statefulsets
      - statefulsets/scale
    verbs:
      - patch # Scale up and down
      - get # Retrieve info about specific dep
      - update # Scale up and down
      - list # Events
      - watch # Events
  {{- if .Values.rbac.cnpg }}
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters
    verbs:
      - get # Retrieve info about a specific cluster
      - list # Discovery and events
      - watch # Events
      - patch # Toggle the hibernation annotation
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sablier-{{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sablier-{{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: sablier-{{ .Release.Name }}
    namespace: {{ .Release.Namespace }}